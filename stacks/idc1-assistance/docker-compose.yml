          if (buffer.length < bodyStart + contentLength) return null;

          const bodyBuf = buffer.slice(bodyStart, bodyStart + contentLength);
          const rest = buffer.slice(bodyStart + contentLength);
          return { body: bodyBuf.toString("utf8"), rest };
