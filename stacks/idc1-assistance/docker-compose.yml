version: "3.9"

x-default-service: &default-service
  restart: unless-stopped
  networks:
    - idc1-stack-net
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  jarvis-backend:
    <<: *default-service
    image: ghcr.io/tonezzz/chaba/jarvis-backend:idc1-assistance
    ports:
      - "127.0.0.1:18018:8018"
    environment:
      PORT: 8018
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_LIVE_MODEL: ${GEMINI_LIVE_MODEL:-gemini-2.5-flash-native-audio-preview-12-2025}
      TRIP_BASE_URL: ${TRIP_BASE_URL:-http://trip:8000}
      TRIP_API_TOKEN: ${TRIP_API_TOKEN:-}
      WEB_FETCHER_BASE_URL: ${WEB_FETCHER_BASE_URL:-http://web-fetcher:8028}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8018/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp-bundle:
    <<: *default-service
    image: ghcr.io/tonezzz/chaba/mcp-bundle:idc1-assistance
    ports:
      - "127.0.0.1:3051:3050"
    command:
      - sh
      - -lc
      - |
        cat > /app/mcp-config/mcp.json <<'EOF'
        { "mcpServers": { "fetch": { "command": "python3", "args": ["-m", "mcp_server_fetch"], "tags": ["fetch", "web"], "disabled": false }, "server-sequential-thinking": { "command": "npx", "args": ["-y", "@modelcontextprotocol/server-sequential-thinking"], "tags": ["thinking"], "disabled": false }, "playwright": { "command": "npx", "args": ["-y", "@playwright/mcp@latest"], "tags": ["playwright", "web", "browser"], "disabled": false } } }
        EOF
        exec node index.js
    environment:
      ONE_MCP_HOST: 0.0.0.0
      ONE_MCP_PORT: 3050
      ONE_MCP_EXTERNAL_URL: http://127.0.0.1:3051
      ONE_MCP_LOG_LEVEL: info
      ONE_MCP_CONFIG_DIR: /app/mcp-config
      ONE_MCP_CONFIG: /app/mcp-config/mcp.json
    volumes:
      - ./mcp-config:/app/mcp-config
      - mcp-bundle-data:/root/.config/1mcp
      - mcp-bundle-cache:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3050/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  web-fetcher:
    <<: *default-service
    image: ghcr.io/tonezzz/chaba/web-fetcher:idc1-assistance
    environment:
      PORT: 8028
      WEB_FETCH_MAX_BYTES: ${WEB_FETCH_MAX_BYTES:-2000000}
      WEB_FETCH_MAX_REDIRECTS: ${WEB_FETCH_MAX_REDIRECTS:-5}
      WEB_FETCH_CONNECT_TIMEOUT_S: ${WEB_FETCH_CONNECT_TIMEOUT_S:-5}
      WEB_FETCH_READ_TIMEOUT_S: ${WEB_FETCH_READ_TIMEOUT_S:-15}
      WEB_FETCH_ALLOWED_CONTENT_TYPES: ${WEB_FETCH_ALLOWED_CONTENT_TYPES:-text/html,text/plain,application/json}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8028/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  trip:
    <<: *default-service
    image: ghcr.io/itskovacs/trip:1
    ports:
      - "127.0.0.1:18081:8000"
    volumes:
      - trip-storage:/app/storage
    command: ["fastapi", "run", "/app/trip/main.py", "--host", "0.0.0.0", "--port", "8000"]

  jarvis-frontend:
    <<: *default-service
    image: ghcr.io/tonezzz/chaba/jarvis-frontend:idc1-assistance
    ports:
      - "127.0.0.1:18080:80"

networks:
  idc1-stack-net:
    driver: bridge
    external: true
    name: idc1-stack-net

volumes:
  trip-storage:
  mcp-bundle-data:
  mcp-bundle-cache:
