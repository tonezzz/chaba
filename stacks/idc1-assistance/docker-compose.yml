version: "3.9"

x-default-service: &default-service
  restart: unless-stopped
  networks:
    - idc1-stack-net
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  jarvis-backend:
    <<: *default-service
    image: ghcr.io/tonezzz/chaba/jarvis-backend:idc1-assistance
    ports:
      - "127.0.0.1:18018:8018"
    environment:
      PORT: 8018
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_LIVE_MODEL: ${GEMINI_LIVE_MODEL:-gemini-2.5-flash-native-audio-preview-12-2025}
      JARVIS_IMAGEN_ASSETS_DIR: ${JARVIS_IMAGEN_ASSETS_DIR:-/app/imagen_assets}
      JARVIS_IMAGEN_MODEL: ${JARVIS_IMAGEN_MODEL:-imagen-4.0-generate-001}
      JARVIS_IMAGEN_ALLOWED_MODELS: ${JARVIS_IMAGEN_ALLOWED_MODELS:-imagen-4.0-generate-001,imagen-4.0-ultra-generate-001,imagen-4.0-fast-generate-001}
      WEB_FETCHER_BASE_URL: ${WEB_FETCHER_BASE_URL:-http://web-fetcher:8028}
      MCP_BASE_URL: ${MCP_BASE_URL:-http://mcp-bundle:3050}
      AIM_MCP_BASE_URL: ${AIM_MCP_BASE_URL:-http://aim-mcp-gateway:3050}
      WEAVIATE_URL: ${WEAVIATE_URL:-http://weaviate:8080}
    volumes:
      - jarvis-imagen-assets:${JARVIS_IMAGEN_ASSETS_DIR:-/app/imagen_assets}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8018/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp-bundle:
    <<: *default-service
    image: ghcr.io/tonezzz/chaba/mcp-bundle:idc1-assistance
    ports:
      - "127.0.0.1:3051:3050"
    command:
      - sh
      - -lc
      - |
        cat > /app/mcp-config/mcp.json <<'EOF'
        { "mcpServers": { "fetch": { "command": "/opt/venv/bin/python", "args": ["-m", "mcp_server_fetch"], "tags": ["fetch", "web"], "disabled": false }, "server-sequential-thinking": { "command": "npx", "args": ["-y", "@modelcontextprotocol/server-sequential-thinking"], "tags": ["thinking"], "disabled": false }, "playwright": { "command": "npx", "args": ["-y", "@playwright/mcp@latest"], "tags": ["playwright", "web", "browser"], "disabled": false } } }
        EOF
        exec node index.js
    environment:
      ONE_MCP_HOST: 0.0.0.0
      ONE_MCP_PORT: 3050
      ONE_MCP_EXTERNAL_URL: http://127.0.0.1:3051
      ONE_MCP_LOG_LEVEL: info
      ONE_MCP_CONFIG_DIR: /app/mcp-config
      ONE_MCP_CONFIG: /app/mcp-config/mcp.json
    volumes:
      - ./mcp-config:/app/mcp-config
      - mcp-bundle-data:/root/.config/1mcp
      - mcp-bundle-cache:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3050/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  aim-mcp-gateway:
    <<: *default-service
    image: ghcr.io/tonezzz/chaba/mcp-bundle:idc1-assistance
    command:
      - sh
      - -lc
      - |
        cat > /app/mcp-config/mcp.json <<'EOF'
        {
          "mcpServers": {
            "aim-kg": {
              "command": "npx",
              "args": ["-y", "mcp-knowledge-graph", "--memory-path", "/data"],
              "tags": ["memory", "knowledge-graph"],
              "disabled": false
            }
          }
        }
        EOF
        exec node index.js
    environment:
      ONE_MCP_HOST: 0.0.0.0
      ONE_MCP_PORT: 3050
      ONE_MCP_EXTERNAL_URL: http://127.0.0.1:3050
      ONE_MCP_LOG_LEVEL: info
      ONE_MCP_CONFIG_DIR: /app/mcp-config
      ONE_MCP_CONFIG: /app/mcp-config/mcp.json
    volumes:
      - aim-mcp-gateway-config:/app/mcp-config
      - aim-kg-data:/data
      - aim-mcp-gateway-data:/root/.config/1mcp
      - aim-mcp-gateway-cache:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3050/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  web-fetcher:
    <<: *default-service
    image: ghcr.io/tonezzz/chaba/web-fetcher:idc1-assistance
    environment:
      PORT: 8028
      WEB_FETCH_MAX_BYTES: ${WEB_FETCH_MAX_BYTES:-2000000}
      WEB_FETCH_MAX_REDIRECTS: ${WEB_FETCH_MAX_REDIRECTS:-5}
      WEB_FETCH_CONNECT_TIMEOUT_S: ${WEB_FETCH_CONNECT_TIMEOUT_S:-5}
      WEB_FETCH_READ_TIMEOUT_S: ${WEB_FETCH_READ_TIMEOUT_S:-15}
      WEB_FETCH_ALLOWED_CONTENT_TYPES: ${WEB_FETCH_ALLOWED_CONTENT_TYPES:-text/html,text/plain,application/json}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8028/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  jarvis-frontend:
    <<: *default-service
    image: ghcr.io/tonezzz/chaba/jarvis-frontend:idc1-assistance
    ports:
      - "127.0.0.1:18080:80"

  weaviate:
    <<: *default-service
    image: semitechnologies/weaviate:1.24.10
    environment:
      QUERY_DEFAULTS_LIMIT: 50
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate-data:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/v1/.well-known/ready | grep -q true || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  idc1-stack-net:
    driver: bridge
    external: true
    name: idc1-stack-net

volumes:
  mcp-bundle-data:
  mcp-bundle-cache:
  aim-kg-data:
  aim-mcp-gateway-config:
  aim-mcp-gateway-data:
  aim-mcp-gateway-cache:
  weaviate-data:
  jarvis-imagen-assets:
