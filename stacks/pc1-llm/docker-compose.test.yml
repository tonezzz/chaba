services:
  # Minimal Gemma test - runs once and exits
  gemma-test:
    image: nvidia/cuda:12.1.0-runtime-ubuntu22.04
    container_name: pc1-gemma-test
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq python3 python3-pip git &&
        pip3 install -q torch transformers accelerate &&
        python3 -c '\
import torch;\
print(\"GPU:\", torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"None\");\
print(\"CUDA:\", torch.version.cuda);\
from transformers import AutoTokenizer, AutoModelForCausalLM;\
print(\"Loading Gemma 4B...\");\
tok = AutoTokenizer.from_pretrained(\"google/gemma-4b-it\");\
model = AutoModelForCausalLM.from_pretrained(\"google/gemma-4b-it\", torch_dtype=torch.float16, device_map=\"auto\");\
print(\"Loaded! Testing...\");\
inputs = tok(\"Hello, I am\", return_tensors=\"pt\").to(\"cuda\");\
out = model.generate(**inputs, max_new_tokens=20);\
print(tok.decode(out[0]));'
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    profiles:
      - test

  # Interactive Python with GPU
  python-gpu:
    image: nvidia/cuda:12.1.0-runtime-ubuntu22.04
    container_name: pc1-python-gpu
    command: sleep infinity
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - huggingface-cache:/root/.cache/huggingface
      - .:/workspace
    working_dir: /workspace
    profiles:
      - interactive

volumes:
  huggingface-cache:
