services:
  # PostgreSQL - Primary database
  postgres:
    image: postgres:15-alpine
    container_name: idc1-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chaba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-chaba}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chaba}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MCP PostgreSQL Server - Official Anthropic MCP server
  mcp-postgres:
    image: mcp/postgres:latest
    build:
      context: https://github.com/modelcontextprotocol/servers.git#main
      dockerfile: src/postgres/Dockerfile
    container_name: idc1-mcp-postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chaba}
      POSTGRES_USER: ${POSTGRES_USER:-chaba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - mcp

volumes:
  postgres-data:
