# NOTE: PostgreSQL and pgAdmin have been moved to idc1-assistance-infra stack
# This stack now uses external postgres service via idc1-db-network

services:
  # MCP Wiki - Knowledge base on idc1
  mcp-wiki:
    build:
      context: ../../mcp/mcp-wiki
      dockerfile: Dockerfile
    container_name: idc1-mcp-wiki
    environment:
      # Use PostgreSQL mode (shared database)
      WIKI_USE_POSTGRES: '1'
      DATABASE_URL: postgresql://${POSTGRES_USER:-chaba}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-chaba}
      WIKI_HTTP_PORT: 8080
      WEAVIATE_URL: http://weaviate:8080
      WIKI_API_KEY: ${WIKI_API_KEY:-}
      # AI API Keys for article enhancement
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # MCP_STDIO: '1'  # Enable for Windsurf MCP stdio transport (HTTP mode for now)
    ports:
      - "3008:8080"
    restart: unless-stopped
    depends_on:
      - weaviate
    # Note: postgres is external (idc1-assistance-infra stack)
    networks:
      - idc1-db-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Wiki Sync Listener - Real-time PostgreSQL to Weaviate sync
  wiki-sync-listener:
    image: python:3.11-slim
    container_name: idc1-wiki-sync-listener
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chaba}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-chaba}
      WEAVIATE_URL: http://weaviate:8080
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      POLL_INTERVAL: '2.0'
    volumes:
      - ../../scripts:/app/scripts:ro
      - ./wiki-sync-entrypoint.sh:/entrypoint.sh:ro
    working_dir: /app
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      - weaviate
    # Note: postgres is external (idc1-assistance-infra stack)
    networks:
      - idc1-db-network

  # Redis - Session and cache storage
  redis:
    image: redis:7-alpine
    container_name: idc1-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - idc1-db-network

  # Weaviate - Vector database for RAG
  weaviate:
    image: semitechnologies/weaviate:1.25.0
    container_name: idc1-weaviate
    ports:
      - "8082:8080"
      - "50051:50051"
    volumes:
      - weaviate-data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - idc1-db-network

  # NOTE: AutoAgent Control Panel moved to idc1-assistance-infra stack

  # GhostRoute Test - OpenRouter model discovery
  ghostroute-test:
    image: python:3.11-alpine
    container_name: idc1-ghostroute-test
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GHOSTROUTE_FREE_ONLY: "true"
      GHOSTROUTE_TIMEOUT: "30"
      GHOSTROUTE_MAX_TOKENS: "100"
    volumes:
      - ../../stacks/autoagent-test/discovery/ghostroute:/app:ro
    working_dir: /app
    command: >
      sh -c "pip install requests --quiet &&
             python test-ghostroute.py"
    restart: "no"
    networks:
      - idc1-db-network

volumes:
  # NOTE: postgres-data and pgadmin-data volumes are managed by idc1-assistance-infra
  # They remain as external volumes for data persistence
  autoagent-workspace:
  redis-data:
  weaviate-data:

networks:
  idc1-db-network:
    driver: bridge
    name: idc1-db-network
    attachable: true
