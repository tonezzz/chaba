services:
  # PostgreSQL - Primary database
  postgres:
    image: postgres:15-alpine
    container_name: idc1-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chaba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-chaba}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chaba}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MCP PostgreSQL Server - Official Anthropic MCP server
  mcp-postgres:
    image: mcp/postgres:latest
    build:
      context: https://github.com/modelcontextprotocol/servers.git#main
      dockerfile: src/postgres/Dockerfile
    container_name: idc1-mcp-postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chaba}
      POSTGRES_USER: ${POSTGRES_USER:-chaba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - mcp

  # pgAdmin - PostgreSQL management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: idc1-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@chaba.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    restart: unless-stopped
    depends_on:
      - postgres

  # MCP Wiki - Knowledge base on idc1
  mcp-wiki:
    build:
      context: ../../mcp/mcp-wiki
      dockerfile: Dockerfile
    container_name: idc1-mcp-wiki
    environment:
      # Use PostgreSQL mode (shared database)
      WIKI_USE_POSTGRES: '1'
      DATABASE_URL: postgresql://${POSTGRES_USER:-chaba}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-chaba}
      WIKI_HTTP_PORT: 8080
      # MCP_STDIO: '1'  # Enable for Windsurf MCP stdio transport (HTTP mode for now)
    ports:
      - "3008:8080"
    restart: unless-stopped
    depends_on:
      - postgres

  # Redis - Session and cache storage
  redis:
    image: redis:7-alpine
    container_name: idc1-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - idc1-db-network

  # Weaviate - Vector database for RAG
  weaviate:
    image: semitechnologies/weaviate:1.25.0
    container_name: idc1-weaviate
    ports:
      - "8082:8080"
      - "50051:50051"
    volumes:
      - weaviate-data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - idc1-db-network

  # AutoAgent Control Panel - Web UI for AutoAgent
  autoagent:
    image: ghcr.io/tonezzz/autoagent-control-panel:idc1-db
    container_name: idc1-autoagent
    environment:
      COMPLETION_MODEL: ${AUTOAGENT_MODEL:-openai/gpt-4o-mini}
      DEBUG: ${AUTOAGENT_DEBUG:-false}
      API_BASE_URL: ${AUTOAGENT_API_BASE_URL:-https://openrouter.ai/api/v1}
      FN_CALL: ${AUTOAGENT_FN_CALL:-true}
      # LLM API Keys
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      # PostgreSQL Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-chaba}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-chaba}
      USE_POSTGRES: '1'
      # Workspace
      WORKSPACE_DIR: /workspace
      DOCKER_WORKPLACE_NAME: autoagent-workspace
    volumes:
      - autoagent-workspace:/workspace
    ports:
      - "8059:8080"  # Control Panel
      - "8058:8056"  # GhostRoute MCP
    restart: unless-stopped
    depends_on:
      - postgres
    # Control panel available at http://idc1.surf-thailand.com:8059/

  # GhostRoute Test - OpenRouter model discovery
  ghostroute-test:
    image: python:3.11-alpine
    container_name: idc1-ghostroute-test
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GHOSTROUTE_FREE_ONLY: "true"
      GHOSTROUTE_TIMEOUT: "30"
      GHOSTROUTE_MAX_TOKENS: "100"
    volumes:
      - ../../stacks/autoagent-test/discovery/ghostroute:/app:ro
    working_dir: /app
    command: >
      sh -c "pip install requests --quiet &&
             python test-ghostroute.py"
    restart: "no"
    networks:
      - idc1-db-network

volumes:
  postgres-data:
  pgadmin-data:
  autoagent-workspace:
  redis-data:
  weaviate-data:

networks:
  idc1-db-network:
    driver: bridge
    name: idc1-db-network
    attachable: true
