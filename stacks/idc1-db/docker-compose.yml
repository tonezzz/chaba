services:
  # SQLite Web - Browser-based SQLite management
  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: idc1-sqlite-web
    environment:
      SQLITE_DATABASE: /data/chaba.db
    volumes:
      - sqlite-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    command: sqlite_web -H 0.0.0.0 -p 8080 /data/chaba.db
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlite-data:
