services:
  mcp-wiki:
    build: ../../mcp/mcp-wiki
    container_name: mcp-wiki
    environment:
      # PostgreSQL mode (required)
      DATABASE_URL: postgresql://${POSTGRES_USER:-chaba}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-chaba}
      WIKI_HTTP_PORT: 8080
      # Optional: Weaviate for semantic search
      WEAVIATE_URL: ${WEAVIATE_URL:-}
      # Optional: API key for write protection
      WIKI_API_KEY: ${WIKI_API_KEY:-}
    ports:
      - "3008:8080"
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - default

  # PostgreSQL for local development
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pc1-wiki-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chaba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-chaba}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - default

volumes:
  postgres-data:
