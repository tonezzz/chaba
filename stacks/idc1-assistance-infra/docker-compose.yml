version: "3.9"

x-default-service: &default-service
  restart: unless-stopped
  networks:
    - idc1-stack-net
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  redis:
    <<: *default-service
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - jarvis-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  weaviate:
    <<: *default-service
    image: semitechnologies/weaviate:1.24.10
    environment:
      QUERY_DEFAULTS_LIMIT: 50
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate-data:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/v1/.well-known/ready >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL - Primary database (merged from idc1-db)
  postgres:
    <<: *default-service
    image: postgres:15-alpine
    container_name: idc1-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chaba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-chaba}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../idc1-assistance/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chaba}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - idc1-stack-net
      - idc1-db-network

  # pgAdmin - PostgreSQL management UI (merged from idc1-db)
  pgadmin:
    <<: *default-service
    image: dpage/pgadmin4:latest
    container_name: idc1-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@chaba.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - idc1-stack-net

  # MCP Wiki - Knowledge base (merged from idc1-db)
  mcp-wiki:
    <<: *default-service
    image: ghcr.io/tonezzz/mcp-wiki:latest
    container_name: idc1-mcp-wiki
    environment:
      WIKI_USE_POSTGRES: '1'
      DATABASE_URL: postgresql://${POSTGRES_USER:-chaba}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-chaba}
      WIKI_HTTP_PORT: 8080
      MCP_STDIO: '0'
    ports:
      - "3008:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - idc1-stack-net
      - idc1-db-network

  # AutoAgent Control Panel (merged from idc1-db)
  autoagent:
    <<: *default-service
    image: ghcr.io/tonezzz/autoagent-control-panel:idc1-db
    container_name: idc1-autoagent
    environment:
      COMPLETION_MODEL: ${AUTOAGENT_MODEL:-openai/gpt-4o-mini}
      DEBUG: ${AUTOAGENT_DEBUG:-false}
      API_BASE_URL: ${AUTOAGENT_API_BASE_URL:-https://openrouter.ai/api/v1}
      FN_CALL: ${AUTOAGENT_FN_CALL:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-chaba}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-chaba}
      USE_POSTGRES: '1'
      WORKSPACE_DIR: /workspace
      DOCKER_WORKPLACE_NAME: autoagent-workspace
    volumes:
      - autoagent-workspace:/workspace
    ports:
      - "8059:8080"
      - "8058:8056"
    depends_on:
      - postgres
    networks:
      - idc1-stack-net
      - idc1-db-network

networks:
  idc1-stack-net:
    driver: bridge
    external: true
    name: idc1-stack-net

  idc1-db-network:
    driver: bridge
    external: true
    name: idc1-db-network

volumes:
  jarvis-redis-data:
    external: true
    name: ${JARVIS_REDIS_DATA_VOLUME_NAME:-idc1-assistance_jarvis-redis-data}

  weaviate-data:
    external: true
    name: ${WEAVIATE_DATA_VOLUME_NAME:-idc1-assistance_weaviate-data}

  # External volumes from idc1-db (preserve data)
  postgres-data:
    external: true
    name: idc1-db_postgres-data

  pgadmin-data:
    external: true
    name: idc1-db_pgadmin-data

  autoagent-workspace:
    external: true
    name: idc1-db_autoagent-workspace
