# MCP GhostRoute Server - Docker Compose
#
# Run the MCP GhostRoute server in a container.
# This makes the server available to all projects on the host.
#
# Usage:
#   docker-compose -f docker-compose.mcp-ghostroute.yml up -d

version: "3.9"

services:
  mcp-ghostroute:
    image: python:3.11-slim
    container_name: mcp-ghostroute
    restart: unless-stopped
    working_dir: /app
    command: >
      bash -c "pip install mcp>=1.0.0 aiohttp>=3.8.0 requests>=2.28.0 &&
               if [ ! -f /data/discovery/ghostroute/latest/recommended_config.json ]; then
                 echo 'Running initial discovery...' &&
                 python discovery.py /data/discovery/ghostroute;
               fi &&
               echo 'Starting MCP server...' &&
               python server.py --transport http --port 8056 --host 0.0.0.0"
    ports:
      - "127.0.0.1:${MCP_GHOSTROUTE_PORT:-8056}:8056"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GHOSTROUTE_DISCOVERY_DIR=/data/discovery/ghostroute
    volumes:
      - ./mcp/mcp-ghostroute:/app:ro
      - mcp-ghostroute-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8056/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mcp-ghostroute-data:
    driver: local
