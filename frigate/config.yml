# Frigate configuration template
# Docs: https://docs.frigate.video/configuration/

mqtt:
  enabled: false
  # host: mqtt.your.network
  # user: mqtt_user
  # password: mqtt_password

detectors:
  # CPU detector (default, slow but works everywhere)
  cpu:
    type: cpu
    num_threads: 2

  # Example: Coral EdgeTPU
  # coral:
  #   type: edgetpu
  #   device: usb

  # Example: NVIDIA GPU via TensorRT
  # tensorrt:
  #   type: tensorrt

  # Example: Intel via OpenVINO
  # openvino:
  #   type: openvino
cameras:

  # --- Coffee ---
  # VSTARCAM IP Camera (Coffee shop)
  # lat=13.7469, lon=100.5346
  vstarcam:
    enabled: true
    ffmpeg:
      output_args:
        record: -f segment -segment_time 10 -segment_format mp4 -reset_timestamps 1 -strftime 1 -an -c:v libx264 -preset ultrafast -crf 28
      inputs:
        - path: rtsp://admin:tonytony@192.168.1.41:10554/tcp/av0_0
          input_args: -rtsp_transport tcp -analyzeduration 10000000 -probesize 10000000
          roles:
            - record
        - path: rtsp://admin:tonytony@192.168.1.41:10554/tcp/av0_1
          input_args: -rtsp_transport tcp -analyzeduration 5000000 -probesize 5000000
          roles:
            - detect
    detect:
      width: 640
      height: 360
      fps: 5
    record:
      enabled: true
      alerts:
        retain:
          days: 14
      detections:
        retain:
          days: 14
      continuous:
        days: 0
      motion:
        days: 7
    snapshots:
      enabled: true
    objects:
      track:
        - person
        - car
        - animal
        - package


  # --- Traffic ---
  # DOH — Bang Pu, Sukhumvit Road outbound
