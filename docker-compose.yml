services:
  imagen-inference:
    build: ./inference
    container_name: imagen-inference
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - MODEL_ID=runwayml/stable-diffusion-v1-5
    volumes:
      - /home/tony/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
