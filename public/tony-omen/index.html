<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>chaba.h3 · Tony Omen</title>
  <style>
    :root { color: #e6edf7; background: #07111f; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; background: radial-gradient(circle at 13% -10%, #173e67 0, transparent 36rem), radial-gradient(circle at 90% 0%, #3b172a 0, transparent 30rem), #07111f; }
    main { width: min(100% - 2rem, 48rem); margin: 0 auto; padding: clamp(1.5rem, 4vw, 4rem) 0; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 3rem; }
    .brand { display: flex; align-items: center; gap: .75rem; color: #f8fafc; font-size: 1.05rem; font-weight: 750; letter-spacing: -.02em; text-decoration: none; }
    .brand-mark { display: grid; width: 2.1rem; height: 2.1rem; place-items: center; border: 1px solid #2f8e81; border-radius: .7rem; color: #7af1d7; background: #0b292d; box-shadow: 0 0 2rem rgb(45 212 191 / 16%); }
    .eyebrow { margin: 0 0 .8rem; color: #7dd3fc; font-size: .78rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
    h1 { margin: 0; color: #f8fafc; font-size: clamp(2.25rem, 6vw, 4rem); line-height: .98; letter-spacing: -.06em; }
    .lead { max-width: 40rem; margin: 1.2rem 0 2.5rem; color: #a9bad0; font-size: clamp(1rem, 2vw, 1.15rem); line-height: 1.7; }
    .metrics { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .metric { padding: 1.4rem 1.5rem; border: 1px solid #243b56; border-radius: 1rem; background: rgb(12 26 44 / 82%); }
    .metric strong { display: block; color: #f8fafc; font-size: clamp(2.4rem, 7vw, 3.6rem); line-height: 1; letter-spacing: -.04em; }
    .metric span { display: block; margin-top: .4rem; color: #8fa4bd; font-size: .9rem; }
    .metric.temp strong { color: #fbbf24; }
    .metric.fan strong { color: #38bdf8; }
    .status { display: inline-flex; align-items: center; gap: .45rem; padding: .45rem .7rem; border: 1px solid #28415e; border-radius: 999px; color: #bdd2eb; background: rgb(15 35 57 / 70%); font-size: .78rem; font-weight: 700; }
    .status::before { width: .48rem; height: .48rem; border-radius: 50%; background: #94a3b8; content: ''; }
    .status.online { color: #7af1d7; }
    .status.online::before { background: #2ecc71; box-shadow: 0 0 .7rem rgb(46 204 113 / 38%); }
    .status.offline { color: #f87171; }
    .status.offline::before { background: #ef4444; box-shadow: 0 0 .7rem rgb(239 68 68 / 38%); }
    .meta { margin-top: 1.6rem; color: #607793; font-size: .82rem; }
    .empty { margin-top: 1rem; padding: 1.1rem 1.2rem; border: 1px dashed #334155; border-radius: .9rem; color: #94a3b8; background: rgb(15 23 42 / 60%); }
    @media (max-width: 520px) { .metrics { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <a class="brand" href="/"><span class="brand-mark">C</span>chaba.h3</a>
      <span class="status" id="status">Loading</span>
    </header>

    <p class="eyebrow">HP Omen laptop</p>
    <h1>Tony Omen</h1>
    <p class="lead">Live temperature and fan readings reported from the machine.</p>

    <section class="metrics" aria-label="Readings">
      <div class="metric temp">
        <strong id="temp">--</strong>
        <span>Temperature</span>
      </div>
      <div class="metric fan">
        <strong id="fan">--</strong>
        <span>Fan speed</span>
      </div>
    </section>

    <div class="empty" id="empty" style="display: none">No readings have been reported yet. Send a POST to <code>/api/report</code> with <code>name</code>, <code>status</code>, <code>temp</code>, and <code>fan</code>.</div>
    <p class="meta" id="meta"></p>
  </main>

  <script>
    async function load() {
      try {
        const res = await fetch('/api/status/Tony%20Omen', { credentials: 'include' });
        if (res.status === 404) {
          document.getElementById('status').textContent = 'No data';
          document.getElementById('empty').style.display = 'block';
          document.getElementById('meta').textContent = '';
          return;
        }
        const data = await res.json();
        const staleMs = Number.parseInt(window.reportStaleMs || '120000', 10);
        const online = data.status === 'online' && (Date.now() - data.reportedAt) < 120000;

        const statusEl = document.getElementById('status');
        statusEl.textContent = online ? 'Online' : 'Offline';
        statusEl.classList.toggle('online', online);
        statusEl.classList.toggle('offline', !online);

        document.getElementById('temp').textContent = data.temp !== undefined ? data.temp + '°C' : '--';
        document.getElementById('fan').textContent = data.fan !== undefined ? data.fan + ' RPM' : '--';
        document.getElementById('empty').style.display = 'none';

        const last = new Date(data.reportedAt).toLocaleString();
        document.getElementById('meta').textContent = 'Last report: ' + last;
      } catch (e) {
        console.error('Tony Omen load failed', e);
      }
    }
    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
