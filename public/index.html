<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>chaba.h3</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: #f8fafc; background: #07111f; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 1.5rem; background: radial-gradient(circle at top, #1e3a5f 0, #07111f 48%); }
    main { width: min(100%, 42rem); padding: clamp(2rem, 6vw, 4rem); border: 1px solid #334155; border-radius: 1.5rem; background: rgb(15 23 42 / 82%); box-shadow: 0 2rem 5rem rgb(0 0 0 / 35%); text-align: center; }
    .status { display: inline-flex; align-items: center; gap: .6rem; padding: .5rem .85rem; border: 1px solid #166534; border-radius: 999px; color: #86efac; background: #052e16; font-weight: 700; }
    .dot { width: .65rem; height: .65rem; border-radius: 50%; background: #22c55e; box-shadow: 0 0 1rem #22c55e; }
    h1 { margin: 1.5rem 0 .75rem; font-size: clamp(2rem, 7vw, 4rem); line-height: 1; letter-spacing: -.04em; }
    p { margin: 0; color: #cbd5e1; font-size: 1.1rem; line-height: 1.7; }
    code { color: #7dd3fc; }
  </style>
</head>
<body>
  <main>
    <div class="status"><span class="dot"></span>Node.js is running</div>
    <h1>chaba.h3 is online</h1>
    <p>Served by Node.js on Plesk.<br>Health check: <code>/health</code></p>
  </main>
</body>
</html>
