<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSH · tony-dell</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #070b13; color: #e6edf7; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    header { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; background: #0d1522; border-bottom: 1px solid #1e293b; }
    h1 { margin: 0; font-size: .95rem; font-weight: 600; }
    #status { font-size: .8rem; color: #94a3b8; }
    #terminal { height: calc(100vh - 48px); padding: .5rem; }
  </style>
</head>
<body>
  <header>
    <h1>tony-dell — SSH</h1>
    <span id="status">Connecting…</span>
  </header>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const term = new Terminal({
      cursorBlink: true,
      fontSize: 14,
      theme: { background: '#070b13', foreground: '#e6edf7', cursor: '#38bdf8' }
    });
    const fitAddon = typeof FitAddon !== 'undefined' ? new FitAddon() : null;
    if (fitAddon) term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    if (fitAddon) fitAddon.fit();

    const ws = new WebSocket((location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws/ssh');
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => { statusEl.textContent = 'Connected'; statusEl.style.color = '#4ade80'; };
    ws.onclose = () => { statusEl.textContent = 'Disconnected'; statusEl.style.color = '#f87171'; };
    ws.onerror = () => { statusEl.textContent = 'Error'; statusEl.style.color = '#f87171'; };

    ws.onmessage = (e) => {
      const data = e.data instanceof ArrayBuffer ? new Uint8Array(e.data) : e.data;
      term.write(data);
    };

    term.onData((data) => { if (ws.readyState === WebSocket.OPEN) ws.send(data); });
    term.onResize(({ cols, rows }) => {
      if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    });

    window.addEventListener('resize', () => { if (fitAddon) fitAddon.fit(); });
  </script>
</body>
</html>
