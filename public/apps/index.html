<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Apps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { bg: '#1a1a2e', card: '#16213e', accent: '#0a84ff' }
        }
      }
    }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    .app-card:hover { transform: translateY(-2px); }
  </style>
</head>
<body class="bg-bg text-gray-200 min-h-screen">
  <div id="nav"></div>

  <main id="apps" class="max-w-6xl mx-auto px-4 py-10"></main>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script>
    fetch('apps.yml').then(r => r.text()).then(text => {
      const data = jsyaml.load(text);
      document.title = data.title || 'Apps';
      document.getElementById('nav').innerHTML = renderNav(data.nav);
      document.getElementById('apps').innerHTML = renderApps(data);
    });
    function isActive(path, href) {
      if (href === '#' || !href) return false;
      if (href === '/') return path === '/';
      return path === href || path.startsWith(href);
    }
    function renderNav(items) {
      const path = window.location.pathname;
      const activeItem = items.filter(i => isActive(path, i.href)).sort((a, b) => b.href.length - a.href.length)[0];
      return `<nav class="bg-card border-b border-gray-700 sticky top-0 z-50 h-12">
        <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
          <div class="flex items-center gap-6 h-full">
            <a href="/" class="text-lg font-bold text-white">HomeLab</a>
            <div class="hidden md:flex gap-4 text-sm h-full items-center">
              ${items.map(i => {
                const active = i === activeItem;
                const cls = active ? 'text-accent font-semibold' : i.placeholder ? 'text-gray-500 hover:text-gray-400 transition cursor-not-allowed' : 'text-gray-400 hover:text-white transition';
                return `<a href="${i.href}" class="${cls}">${i.label}</a>`;
              }).join('')}
            </div>
          </div>
        </div>
      </nav>`;
    }
    function renderApps(data) {
      return `<h1 class="text-3xl font-bold mb-2">${data.title}</h1>
        <p class="text-gray-400 mb-8">Local chaba.h3 apps and placeholders for future tools.</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          ${data.apps.map(a => {
            const base = a.placeholder
              ? 'block p-6 rounded-xl border border-dashed border-gray-700 bg-card/50 cursor-not-allowed transition'
              : 'app-card block p-6 rounded-xl border border-gray-700 bg-card hover:border-accent transition';
            const titleCls = a.placeholder ? 'text-xl font-semibold text-gray-500' : 'text-xl font-semibold text-white';
            const descCls = a.placeholder ? 'text-gray-600 text-sm mt-2' : 'text-gray-400 text-sm mt-2';
            return `<a href="${a.href}" class="${base}">
              <h2 class="${titleCls}">${a.title}</h2>
              <p class="${descCls}">${a.description}</p>
            </a>`;
          }).join('')}
        </div>`;
    }
  </script>
</body>
</html>
