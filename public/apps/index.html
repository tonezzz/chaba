<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Apps</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    .app-card:hover { transform: translateY(-2px); }
  </style>
  <link rel="stylesheet" href="/assets/tailwind.css">
</head>
<body class="bg-bg text-gray-200 min-h-screen">
  <div id="nav"></div>

  <main id="apps" class="max-w-6xl mx-auto px-4 py-10"></main>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="/apps/nav.js"></script>
  <script>
    fetch('apps.yml').then(r => r.text()).then(text => {
      const data = jsyaml.load(text);
      document.title = data.title || 'Apps';
      document.getElementById('nav').innerHTML = ChabaNav.renderNav(data.nav);
      document.getElementById('apps').innerHTML = renderApps(data);
    });
    function renderApps(data) {
      return `<h1 class="text-3xl font-bold mb-2">${data.title}</h1>
        <p class="text-gray-400 mb-8">Local chaba.h3 apps and placeholders for future tools.</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          ${data.apps.map(a => {
            const base = a.placeholder
              ? 'block p-6 rounded-xl border border-dashed border-gray-700 bg-card/50 cursor-not-allowed transition'
              : 'app-card block p-6 rounded-xl border border-gray-700 bg-card hover:border-accent transition';
            const titleCls = a.placeholder ? 'text-xl font-semibold text-gray-500' : 'text-xl font-semibold text-white';
            const descCls = a.placeholder ? 'text-gray-600 text-sm mt-2' : 'text-gray-400 text-sm mt-2';
            return `<a href="${a.href}" class="${base}">
              <h2 class="${titleCls}">${a.title}</h2>
              <p class="${descCls}">${a.description}</p>
            </a>`;
          }).join('')}
        </div>`;
    }
  </script>
</body>
</html>
