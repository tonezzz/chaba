<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Track3 Race Course</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <link rel="stylesheet" href="/assets/tailwind.css">
    <link rel="stylesheet" href="/apps/common.css">
  <link rel="stylesheet" href="track3.css">
</head>
<body class="bg-bg">
  <div id="app-nav"></div>

  <div class="relative">
    <div id="map"></div>
    <div class="course-panel bg-card/95 border border-gray-700 rounded-lg p-4 shadow-lg w-80 text-sm">
      <h2 class="font-semibold text-white mb-2">Race Course Guide</h2>
      <div id="summary" class="text-xs text-gray-400 mb-3">Loading...</div>
      <div id="brief" class="text-xs text-gray-300 mb-3"></div>
      <div class="flex gap-2 mb-3">
        <button id="tab-map" class="flex-1 px-2 py-1 text-xs rounded bg-gray-700 text-white">Map</button>
        <button id="tab-sections" class="flex-1 px-2 py-1 text-xs rounded bg-gray-800 text-gray-300">Sections</button>
        <button id="tab-sim" class="flex-1 px-2 py-1 text-xs rounded bg-gray-800 text-gray-300">Sim</button>
      </div>
      <div id="tab-map-content">
        <div class="space-y-2 mb-3">
          <label class="flex items-center gap-2 text-xs cursor-pointer"><input id="toggle-guide" type="checkbox" checked class="accent-accent"> แสดงเส้นทาง</label>
          <label class="flex items-center gap-2 text-xs cursor-pointer"><input id="toggle-markers" type="checkbox" checked class="accent-accent"> แสดงทุ่น</label>
          <label class="flex items-center gap-2 text-xs cursor-pointer"><input id="toggle-zones" type="checkbox" checked class="accent-accent"> แสดงวงรอบทุ่น</label>
        </div>
        <div class="border-t border-gray-700 pt-2">
          <h3 class="font-semibold text-white text-xs mb-1">Legs</h3>
          <div id="legs" class="space-y-1 text-xs">Loading...</div>
        </div>
      </div>
      <div id="tab-sections-content" class="hidden">
        <h3 class="font-semibold text-white text-xs mb-1">
          <label class="flex items-center gap-2 cursor-pointer">
            <input id="check-all-sections" type="checkbox" checked> Race Sections
          </label>
        </h3>
        <div id="sections-list" class="space-y-1 text-xs">No sections</div>
      </div>
      <div id="tab-sim-content" class="hidden">
        <h3 class="font-semibold text-white text-xs mb-2">Race Simulation</h3>
        <div class="grid grid-cols-2 gap-2 mb-3">
          <button id="sim-start" class="px-2 py-1 text-xs rounded bg-green-700 text-white">Start</button>
          <button id="sim-reset" class="px-2 py-1 text-xs rounded bg-gray-700 text-white">Reset</button>
        </div>
        <div class="space-y-2 mb-3 text-xs">
          <label class="flex items-center justify-between">Racers <input id="sim-racers" type="range" min="2" max="10" value="5" class="accent-accent"></label>
          <label class="flex items-center justify-between">Speed <input id="sim-speed" type="range" min="0.5" max="3" step="0.5" value="1" class="accent-accent"></label>
        </div>
        <div id="sim-standings" class="space-y-1 text-xs">Press Start to simulate</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/apps/nav.js"></script>
  <script src="course.js"></script>
  <script src="renderer.js"></script>
    <script src="track3.js"></script>
</body>
</html>
