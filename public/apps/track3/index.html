<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Track3 Race Course</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <link rel="stylesheet" href="/assets/tailwind.css">
  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; color: #e5e7eb; }
    #map { width: 100%; height: calc(100vh - 48px); background: #0b1021; }
    .marker-icon { display: flex; align-items: center; justify-content: center; width: 28px !important; height: 28px !important; margin-left: -14px !important; margin-top: -14px !important; }
    .marker-icon svg { width: 20px; height: 20px; filter: drop-shadow(0 0 2px rgba(0,0,0,0.7)); }
    .marker-label { display: flex; align-items: center; justify-content: center; width: auto !important; height: 14px !important; padding: 0 4px; font-size: 10px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.55); border-radius: 3px; white-space: nowrap; margin-left: 0 !important; margin-top: -30px !important; }
    .line-label { display: flex; align-items: center; justify-content: center; width: auto !important; height: 18px !important; padding: 0 6px; font-size: 10px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.6); border-radius: 3px; white-space: nowrap; }
    .arrow-icon { display: flex; align-items: center; justify-content: center; width: 16px !important; height: 16px !important; margin-left: -8px !important; margin-top: -8px !important; }
    .arrow-icon svg { width: 12px; height: 12px; }
    .leaflet-popup-content { font-size: 13px; color: #111; }
    .course-panel { position: absolute; top: 60px; right: 12px; z-index: 1000; max-height: calc(100vh - 80px); overflow-y: auto; }
    .course-panel * { pointer-events: auto; }
  </style>
</head>
<body class="bg-bg">
  <div id="app-nav"></div>

  <div class="relative">
    <div id="map"></div>
    <div class="course-panel bg-card/95 border border-gray-700 rounded-lg p-4 shadow-lg w-80 text-sm">
      <h2 class="font-semibold text-white mb-2">Race Course Guide</h2>
      <div id="summary" class="text-xs text-gray-400 mb-3">Loading...</div>
      <div id="brief" class="text-xs text-gray-300 mb-3"></div>
      <div class="flex gap-2 mb-3">
        <button id="tab-map" class="flex-1 px-2 py-1 text-xs rounded bg-gray-700 text-white">Map</button>
        <button id="tab-sections" class="flex-1 px-2 py-1 text-xs rounded bg-gray-800 text-gray-300">Sections</button>
      </div>
      <div id="tab-map-content">
        <div class="space-y-2 mb-3">
          <label class="flex items-center gap-2 text-xs cursor-pointer"><input id="toggle-guide" type="checkbox" checked class="accent-accent"> แสดงเส้นทาง</label>
          <label class="flex items-center gap-2 text-xs cursor-pointer"><input id="toggle-markers" type="checkbox" checked class="accent-accent"> แสดงทุ่น</label>
          <label class="flex items-center gap-2 text-xs cursor-pointer"><input id="toggle-zones" type="checkbox" checked class="accent-accent"> แสดงวงรอบทุ่น</label>
        </div>
        <div class="border-t border-gray-700 pt-2">
          <h3 class="font-semibold text-white text-xs mb-1">Legs</h3>
          <div id="legs" class="space-y-1 text-xs">Loading...</div>
        </div>
      </div>
      <div id="tab-sections-content" class="hidden">
        <h3 class="font-semibold text-white text-xs mb-1">Race Sections</h3>
        <div id="sections-list" class="space-y-1 text-xs">No sections</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="course.js"></script>
  <script src="renderer.js"></script>
  <script>
    const ROUND_DIST = 25;
    const STORAGE_KEY = 'track3-marker-overrides';
    let courseData = null;
    let renderer = null;
    let state = { overrides: {} };

    const map = L.map('map');
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    function getMergedMarkers() {
      return Object.entries(courseData.markers || {}).map(([id, m]) => ({ id, ...m, ...(state.overrides[id] || {}) }));
    }
    function saveOverrides() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.overrides)); } catch (e) { console.warn('failed to save overrides', e); }
    }
    function loadOverrides() {
      try { state.overrides = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { state.overrides = {}; }
    }

    function renderNav(items) {
      const path = window.location.pathname;
      const isActive = (href) => href && href !== '#' && (path === href || path.startsWith(href));
      return `<nav class="bg-card border-b border-gray-700 sticky top-0 z-50 h-12"><div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between"><a href="/" class="text-lg font-bold text-white">HomeLab</a><div class="hidden md:flex gap-4 text-sm h-full items-center">${items.map(i => `<a href="${i.href}" class="${isActive(i.href) ? 'text-accent font-semibold' : i.placeholder ? 'text-gray-500 cursor-not-allowed' : 'text-gray-400 hover:text-white transition'}">${i.label}</a>`).join('')}</div></div></nav>`;
    }

    function updatePanel(course, g) {
      document.getElementById('summary').textContent = `Total: ${g.total.toFixed(0)} m | Laps: ${course.repeat || 1}`;
      const briefEl = document.getElementById('brief');
      if (briefEl) {
        if (Array.isArray(course.brief) && course.brief.length) {
          briefEl.innerHTML = `<ul class="list-disc pl-4 space-y-1">${course.brief.map(b => `<li>${b}</li>`).join('')}</ul>`;
        } else {
          briefEl.innerHTML = '';
        }
      }
      document.getElementById('legs').innerHTML = g.legInfo.map((l, i) =>
        `<div class="flex justify-between"><span>${i + 1}. ${l.label}</span><span class="text-gray-400">${l.distance.toFixed(0)} m</span></div>`
      ).join('');
    }

    function updateSections(drawables) {
      const list = document.getElementById('sections-list');
      const sections = (drawables || []).filter(d => d.kind === 'section');
      if (!sections.length) {
        list.innerHTML = '<div class="text-gray-500 text-xs">No sections defined</div>';
        return;
      }
      list.innerHTML = '';
      sections.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'mb-2';
        row.innerHTML = `
          <div class="flex items-center justify-between">
            <span class="text-white">${i + 1}. ${s.text || s.key}</span>
            <button class="text-accent text-xs hover:underline" data-idx="${i}">Inspect</button>
          </div>
          <div class="text-gray-400 text-xs">${s.distance != null ? s.distance.toFixed(0) + ' m' : ''}</div>
        `;
        row.querySelector('button').onclick = () => {
          const pts = s.points.map(p => [p[0], p[1]]);
          if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.25));
        };
        list.appendChild(row);
      });
    }

    function setupTabs() {
      const mapBtn = document.getElementById('tab-map');
      const secBtn = document.getElementById('tab-sections');
      const mapContent = document.getElementById('tab-map-content');
      const secContent = document.getElementById('tab-sections-content');
      function activate(which) {
        if (which === 'map') {
          mapContent.classList.remove('hidden');
          secContent.classList.add('hidden');
          mapBtn.classList.add('bg-gray-700', 'text-white');
          mapBtn.classList.remove('bg-gray-800', 'text-gray-300');
          secBtn.classList.add('bg-gray-800', 'text-gray-300');
          secBtn.classList.remove('bg-gray-700', 'text-white');
        } else {
          mapContent.classList.add('hidden');
          secContent.classList.remove('hidden');
          secBtn.classList.add('bg-gray-700', 'text-white');
          secBtn.classList.remove('bg-gray-800', 'text-gray-300');
          mapBtn.classList.add('bg-gray-800', 'text-gray-300');
          mapBtn.classList.remove('bg-gray-700', 'text-white');
        }
      }
      mapBtn.onclick = () => activate('map');
      secBtn.onclick = () => activate('sections');
    }

    function onMarkerDrag(id, lat, lon) {
      state.overrides[id] = { lat, lon };
      saveOverrides();
      render(false);
    }

    function render(fit = false) {
      const markers = getMergedMarkers();
      const g = renderer.draw(courseData.course, markers, { onDrag: onMarkerDrag, fit });
      updatePanel(courseData.course, g);
      updateSections(renderer.lastDrawables);
    }

    function setupToggles() {
      document.getElementById('toggle-guide').addEventListener('change', (e) => {
        if (e.target.checked) renderer.guideLayer.addTo(map); else map.removeLayer(renderer.guideLayer);
      });
      document.getElementById('toggle-markers').addEventListener('change', (e) => {
        if (e.target.checked) renderer.markerLayer.addTo(map); else map.removeLayer(renderer.markerLayer);
      });
      document.getElementById('toggle-zones').addEventListener('change', (e) => {
        if (e.target.checked) renderer.zoneLayer.addTo(map); else map.removeLayer(renderer.zoneLayer);
      });
    }

    Promise.all([fetch('/apps/apps.yml'), fetch('/apps/track3/courses/tabsai-ws8-track3.yml')])
      .then(rs => Promise.all(rs.map(r => r.text())))
      .then(([appsText, courseText]) => {
        const appData = jsyaml.load(appsText);
        courseData = jsyaml.load(courseText);
        loadOverrides();
        renderer = new CourseRenderer(map, { roundDist: ROUND_DIST });
        document.getElementById('app-nav').innerHTML = renderNav(appData.nav);
        render(true);
        setupToggles();
        setupTabs();
      })
      .catch(err => {
        console.error('failed to load course data', err);
        document.getElementById('summary').textContent = 'Error loading course';
      });
  </script>
</body>
</html>
