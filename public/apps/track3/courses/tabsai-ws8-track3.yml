markers:
  in-bouy:
    icon: sausage-orange
    label: ทุ่นใน
    description: ทุ่นใกล้ฝั่ง
    lat: 13.24500
    lon: 100.92760
  out-bouy:
    icon: sausage-orange
    label: ทุ่นนอก
    description: ทุ่นไกลฝั่ง
    lat: 13.24500
    lon: 100.92840
  start-flag:
    icon: flag-checkered
    label: ธงสตาร์ท/ธงเส้นชัย
    description: 
    lat: 13.24500
    lon: 100.92800
  beach-start-upwind:
    icon: flag-square
    label: ธงบีชสตาร์ท เหนือลม
    description: 
    lat: 13.24470
    lon: 100.92790
  beach-start-downwind:
    icon: flag-square
    label: ธงบีชสตาร์ท ใต้ลม
    description: 
    lat: 13.24470
    lon: 100.92810

course:
  brief:
    - Wait between the beach-start-upwind and beach-start-downwind
    - Sail past start start_line
    - Round the out-bouy keeping it on your port side
    - Round the in-bouy keeping it on your starboard side
    - Round the out-bouy keeping it on your port side
    - Finish by passing the finish line
  annotations:
    - type: line
      role: beach_start
      from: beach-start-upwind
      to: beach-start-downwind
      text: เส้นบีชสตาร์ท
      label_side: front
    - type: line
      role: start
      from: in-bouy
      to: start-flag
      text: เส้นสตาร์ท
      label_side: front
    - type: line
      role: finish
      from: in-bouy
      to: start-flag
      text: เส้นชัย
      label_side: front
    - type: zone
      mark: out-bouy
      radius: 25
    - type: zone
      mark: in-bouy
      radius: 25
  legs:
    - mark: out-bouy
      rounding: port
      label: รอทุ่นนอก ฝั่งซ้าย
    - mark: in-bouy
      rounding: starboard
      label: รอทุ่นใน ฝั่งขวา
    - mark: out-bouy
      rounding: port
      label: รอทุ่นนอก ฝั่งซ้าย (ขากลับ)
