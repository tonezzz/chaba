markers:
  in-bouy:
    icon: sausage-orange
    label: ทุ่นใน
    description: ทุ่นใกล้ฝั่ง
    lat: 13.24500
    lon: 100.92760
  out-bouy:
    icon: sausage-orange
    label: ทุ่นนอก
    description: ทุ่นไกลฝั่ง
    lat: 13.24500
    lon: 100.92840
  start-flag:
    icon: flag-checkered
    label: ธงสตาร์ท/ธงเส้นชัย
    description: 
    lat: 13.24500
    lon: 100.92800
  beach-start-upwind:
    icon: flag-square
    label: ธงบีชสตาร์ท เหนือลม
    description: 
    lat: 13.24470
    lon: 100.92790
  beach-start-downwind:
    icon: flag-square
    label: ธงบีชสตาร์ท ใต้ลม
    description: 
    lat: 13.24470
    lon: 100.92810

wind:
  direction: 180

course:
  brief:
    - Wait between the beach-start-upwind and beach-start-downwind
    - Sail past start start_line
    - Round the out-bouy keeping it on your port side
    - Round the in-bouy keeping it on your starboard side
    - Round the out-bouy keeping it on your port side
    - Finish by passing the finish line
  annotations:
    beach_start_line:
      type: line
      role: beach_start
      from: beach-start-upwind
      to: beach-start-downwind
      text: BEACH START
      label_side: front
    start_line:
      type: line
      role: start
      from: in-bouy
      to: start-flag
      text: START
      label_side: front
    finish_line:
      type: line
      role: finish
      from: in-bouy
      to: start-flag
      text: FINISH
      label_side: front
    out_bouy_zone:
      type: zone
      mark: out-bouy
      radius: 25
    in_bouy_zone:
      type: zone
      mark: in-bouy
      radius: 25
    path_beach_to_start:
      type: path
      from: beach_start_line
      to: start_line
      color: '#64748b'
      dash: '4,6'
  sections:
    beach_start:
      type: arrow-area
      from: beach_start_line
      to: start_line
      text: บีชสตาร์ท
    leg_1:
      type: arrow-area
      from: start_line
      to: out_bouy_zone
      text: สตาร์ท-ทุ่นนอก รอบที่ 1
    round_bouy_out_1:
      type: round-bouy
      bouy: out_bouy_zone
      rounding: port
      text: อ้อมทุ่นนอก-รอบที่-1
    leg_2:
      type: arrow-area
      from: out_bouy_zone
      to: in_bouy_zone
      text: ทุ่นนอก-ทุ่นใน-รอบที่-1
    round_bouy_in_1:
      type: round-bouy
      bouy: in_bouy_zone
      rounding: starboard
      text: อ้อมทุ่นใน-รอบที่-1
    leg_3:
      type: arrow-area
      from: in_bouy_zone
      to: out_bouy_zone
      text: ทุ่นใน-ทุ่นนอก-รอบที่-2
    round_bouy_out_2:
      type: round-bouy
      bouy: out_bouy_zone
      rounding: port
      text: อ้อมทุ่นนอก-รอบ-2
    leg_4:
      type: arrow-area
      from: out_bouy_zone
      to: finish_line
      text: เส้นชัย
