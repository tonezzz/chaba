<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Track2 Race</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="/apps/nav.js"></script>
    <link rel="stylesheet" href="/apps/common.css">
  <link rel="stylesheet" href="track2.css">
  <link rel="stylesheet" href="/assets/tailwind.css">
</head>
<body class="bg-bg text-gray-200">
  <div id="app-nav"></div>

  <div class="relative">
    <div id="map"></div>
    <div class="race-panel bg-card/95 border border-gray-700 rounded-lg p-4 shadow-lg w-80 text-sm">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-white">Windsurf Race</h2>
        <span id="race-status" class="bg-gray-700 px-2 py-0.5 rounded text-xs">Ready</span>
      </div>

      <div class="grid grid-cols-2 gap-2 mb-3">
        <button id="btn-start" class="bg-accent hover:bg-blue-600 text-white rounded px-3 py-1.5 font-medium">Start</button>
        <button id="btn-pause" class="bg-slate-700 hover:bg-slate-600 rounded px-3 py-1.5 font-medium" disabled>Pause</button>
      </div>
      <button id="btn-reset" class="w-full bg-slate-700 hover:bg-slate-600 rounded px-3 py-1.5 mb-3">Reset</button>
      <button id="btn-download" class="w-full bg-slate-700 hover:bg-slate-600 rounded px-3 py-1.5 mb-3">Download course.yml</button>

      <div class="mb-3 space-y-2">
        <div class="flex items-center justify-between">
          <label class="text-gray-400 text-xs">Wind</label>
          <span id="wind-readout" class="text-xs">--</span>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-gray-500 text-xs">Dir</label>
            <input id="wind-dir" type="number" value="90" min="0" max="359" class="w-full bg-slate-800 border border-gray-600 rounded px-2 py-1 text-xs">
          </div>
          <div>
            <label class="text-gray-500 text-xs">kts</label>
            <input id="wind-kts" type="number" value="12" min="0" max="50" class="w-full bg-slate-800 border border-gray-600 rounded px-2 py-1 text-xs">
          </div>
        </div>
      </div>

      <div class="mb-3">
        <label class="block text-gray-400 text-xs mb-1">Speed <span id="speed-label">1.0x</span></label>
        <input id="speed" type="range" min="0.5" max="10" step="0.5" value="1" class="w-full accent-accent">
      </div>
      <div class="flex items-center gap-2 mb-3">
        <input id="trails" type="checkbox" checked class="accent-accent">
        <label for="trails" class="text-gray-300">Show trails</label>
      </div>

      <div class="flex items-center justify-between border-t border-gray-700 pt-2">
        <span class="text-gray-400 text-xs">Elapsed</span>
        <span id="timer" class="font-mono text-white">0:00.0</span>
      </div>

      <div class="mt-4 border-t border-gray-700 pt-3">
        <h3 class="font-semibold text-white mb-2">Course Guide</h3>
        <div id="course-guide" class="space-y-1 text-xs">Loading...</div>
      </div>

      <div class="mt-4 border-t border-gray-700 pt-3">
        <h3 class="font-semibold text-white mb-2">Leaderboard</h3>
        <div id="leaderboard" class="space-y-1 text-xs">Loading...</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../track3/course.js"></script>
    <script src="track2.js"></script>
</body>
</html>
