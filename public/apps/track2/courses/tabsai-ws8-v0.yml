markers:
  in-bouy:
    icon: sausage-orange
    label: ทุ่นใน
    description: ทุ่นใกล้ฝั่ง
    lat: 13.24480
    lon: 100.92750
  out-bouy:
    icon: sausage-orange
    label: ทุ่นนอก
    description: ทุ่นไกลฝั่ง
    lat: 13.24480
    lon: 100.92780
  start-flag:
    icon: flag-checkered
    label: ธงสตาร์ท/ธงเส้นชัย
    description: 
    lat: 13.24480
    lon: 100.92750
  beach-start-upwind:
    icon: flag-square
    label: ธงบีชสตาร์ท เหนือลม
    description: 
    lat: 13.24480
    lon: 100.92750
  beach-start-downwind:
    icon: flag-square
    label: ธงบีชสตาร์ท ใต้ลม
    description: 
    lat: 13.24480
    lon: 100.92750
course:
  repeat: 2
  annotations:
    beach_start_line:
      type: line
      role: beach_start
      from: beach-start-upwind
      to: beach-start-downwind
      text: เส้นบีชสตาร์ท
      label_side: front
    start_line:
      type: line
      role: start
      from: in-bouy
      to: start-flag
      text: เส้นสตาร์ท
      label_side: front
    finish_line:
      type: line
      role: finish
      from: in-bouy
      to: start-flag
      text: เส้นชัย
      label_side: front
    out_bouy_zone:
      type: zone
      mark: out-bouy
      radius: 25
    in_bouy_zone:
      type: zone
      mark: in-bouy
      radius: 25
  sections:
    beach_start:
      type: arrow-area
      from: beach_start_line 
      to: start_line
      text: บีชสตาร์ท
    leg_1:
      type: arrow-area
      from: start_line
      to: out_bouy_zone
      text: สตาร์ท-ทุ่นนอก-รอบ-1
    round_bouy_out_1:
      type: round-bouy
      bouy: out_bouy_zone
      text: อ้อมทุ่นนอก-รอบ-1
    leg_2:
      type: arrow-area
      from: out_bouy_zone
      to: in_bouy_zone
      text: ทุ่นนอก-ทุ่นใน-รอบ-1
    round_bouy_in_1:
      type: round-bouy
      bouy: in_bouy_zone
      text: อ้อมทุ่นใน-รอบ-1
    leg_3:
      type: arrow-area
      from: in_bouy_zone
      to: out_bouy_zone
      text: ทุ่นใน-ทุ่นนอก-รอบ-2
    round_bouy_out_2:
      type: round-bouy
      bouy: out_bouy_zone
      text: อ้อมทุ่นนอก-รอบ-2
    leg_4:
      type: arrow-area
      from: out_bouy_zone
      to: finish_line
      text: เส้นชัย
