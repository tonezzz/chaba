<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Track</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="/apps/nav.js"></script>
    <link rel="stylesheet" href="/apps/common.css">
  <link rel="stylesheet" href="track.css">
  <link rel="stylesheet" href="/assets/tailwind.css">
</head>
<body class="bg-bg text-gray-200">
  <div id="app-nav"></div>

  <div class="relative">
    <div id="map"></div>
    <div class="control-panel bg-card/95 border border-gray-700 rounded-lg p-4 shadow-lg w-64 text-sm">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-white">Live Objects</h2>
        <span id="count" class="bg-accent/20 text-accent px-2 py-0.5 rounded text-xs">0</span>
      </div>
      <div class="space-y-3">
        <div>
          <button id="playPause" class="w-full bg-accent hover:bg-blue-600 text-white rounded px-3 py-1.5 font-medium">Pause</button>
        </div>
        <div>
          <label class="block text-gray-400 text-xs mb-1">Speed <span id="speedLabel">1x</span></label>
          <input id="speed" type="range" min="0.25" max="5" step="0.25" value="1" class="w-full accent-accent">
        </div>
        <div class="flex items-center gap-2">
          <input id="trails" type="checkbox" checked class="accent-accent">
          <label for="trails" class="text-gray-300">Show trails</label>
        </div>
        <div class="flex gap-2">
          <button id="addVehicle" class="flex-1 bg-slate-700 hover:bg-slate-600 rounded px-2 py-1.5 text-xs">Add</button>
          <button id="reset" class="flex-1 bg-slate-700 hover:bg-slate-600 rounded px-2 py-1.5 text-xs">Reset</button>
        </div>
      </div>
      <div class="mt-4 border-t border-gray-700 pt-3">
        <h3 class="font-semibold text-white mb-2">Objects</h3>
        <div id="objectList" class="space-y-1 text-xs text-gray-300">Loading...</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="track.js"></script>
</body>
</html>
