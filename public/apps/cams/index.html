<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bg: '#1a1a2e', card: '#16213e', accent: '#0a84ff' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: system-ui, sans-serif; }
        #map { width: 100%; height: calc(100vh - 48px); }
        .camera-popup { min-width: 320px; }
        .camera-popup h3 { margin-bottom: 6px; font-size: 14px; font-weight: 600; color: #111; }
        .camera-popup .meta { font-size: 12px; color: #555; margin-bottom: 6px; }
        .camera-popup .coverage-tag { display: inline-block; background: #eee; color: #333; padding: 1px 6px; border-radius: 4px; margin-right: 4px; font-size: 11px; }
        .camera-popup .video-container { position: relative; width: 300px; height: 170px; background: #000; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
        .camera-popup video { width: 100%; height: 100%; object-fit: cover; }
        .camera-popup .snapshot-img { width: 300px; height: 170px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; background: #000; }
        .camera-popup .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #aaa; font-size: 13px; pointer-events: none; }
        .camera-popup a { display: inline-block; padding: 4px 12px; background: #0a84ff; color: #fff; text-decoration: none; border-radius: 4px; font-size: 12px; }
        .camera-popup a:hover { background: #0066cc; }
        .legend { position: absolute; bottom: 20px; left: 20px; z-index: 1000; background: rgba(26,26,46,0.95); padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.8; color: #eee; }
        .legend .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; }
    </style>
</head>
<body class="bg-bg text-gray-200">
    <nav class="bg-card border-b border-gray-700 sticky top-0 z-50 h-12">
        <div class="max-w-6xl mx-auto px-4 h-full flex items-center gap-6">
            <a href="/" class="text-lg font-bold text-white">HomeLab</a>
            <div class="flex gap-4 text-sm">
                <a href="/" class="text-gray-400 hover:text-white transition">Dashboard</a>
                <a href="/apps/cams/" class="text-accent font-semibold">Cameras</a>
                <a href="/infrastructure.html" class="text-gray-400 hover:text-white transition">Infrastructure</a>
                <a href="/decisions.html" class="text-gray-400 hover:text-white transition">Decisions</a>
            </div>
        </div>
    </nav>

    <div class="relative">
        <div id="map"></div>
        <div class="legend" id="legend">Loading cameras...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
    <script>
        let activeHls = null;
        let snapshotTimer = null;
        let cameras = [];
        let groups = {};

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function stopAllPlayers() {
            if (activeHls) { activeHls.destroy(); activeHls = null; }
            if (snapshotTimer) { clearInterval(snapshotTimer); snapshotTimer = null; }
        }

        function startHls(videoEl, url) {
            const loading = videoEl.parentElement.querySelector('.loading');
            if (Hls.isSupported()) {
                activeHls = new Hls({ liveDurationInfinity: true, liveBackBufferLength: 0 });
                activeHls.loadSource(url);
                activeHls.attachMedia(videoEl);
                activeHls.on(Hls.Events.MANIFEST_PARSED, () => {
                    if (loading) loading.style.display = 'none';
                    videoEl.play().catch(() => {});
                });
                activeHls.on(Hls.Events.ERROR, (_, data) => {
                    if (data.fatal && loading) loading.textContent = 'Stream unavailable';
                });
            } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                videoEl.src = url;
                videoEl.play().catch(() => {});
                if (loading) loading.style.display = 'none';
            } else if (loading) {
                loading.textContent = 'HLS not supported';
            }
        }

        function startSnapshot(imgEl, camName) {
            const update = () => { imgEl.src = `/frigate/api/${camName}/latest.jpg?h=180&cache=` + Date.now(); };
            update();
            snapshotTimer = setInterval(update, 2000);
        }

        function frigateUiUrl(camName) {
            return `http://${window.location.hostname}:5000/cameras/${camName}`;
        }

        function renderLegend() {
            const legend = document.getElementById('legend');
            const items = Object.entries(groups).sort((a, b) => (a[1].order || 0) - (b[1].order || 0));
            legend.innerHTML = items.map(([name, info]) =>
                `<div><span class="dot" style="background:${escapeHtml(info.color || '#0a84ff')}"></span>${escapeHtml(name)}</div>`
            ).join('');
        }

        function createMarker(map, cam, color) {
            let iconHtml, iconSize, iconAnchor;
            if (cam.heading !== null && cam.heading !== undefined) {
                iconHtml = `<div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:20px solid ${color};filter:drop-shadow(0 0 3px rgba(0,0,0,0.6));transform:rotate(${cam.heading}deg);transform-origin:50% 60%;"></div>`;
                iconSize = [20, 24];
                iconAnchor = [10, 14];
            } else {
                iconHtml = `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,0.5);"></div>`;
                iconSize = [20, 20];
                iconAnchor = [10, 10];
            }

            const icon = L.divIcon({ className: 'custom-marker', html: iconHtml, iconSize, iconAnchor });

            const videoHtml = cam.hls_url
                ? `<div class="video-container"><video id="vid_${cam.name}" muted autoplay playsinline></video><div class="loading" id="load_${cam.name}">Loading stream...</div></div>`
                : `<img class="snapshot-img" id="snap_${cam.name}" src="" alt="Loading snapshot...">`;

            const coverage = cam.view && cam.view.coverage ? cam.view.coverage.map(x => `<span class="coverage-tag">${escapeHtml(x)}</span>`).join(' ') : '';
            const location = cam.location ? `<div class="meta">${[cam.location.road, cam.location.km != null ? 'km ' + cam.location.km : '', cam.location.side, cam.location.area].filter(Boolean).join(' · ')}</div>` : '';
            const perspective = cam.perspective ? `<div class="meta">Perspective: ${escapeHtml(cam.perspective)}</div>` : '';
            const viewDesc = cam.view && cam.view.heading_description ? `<div class="meta">Facing: ${escapeHtml(cam.view.heading_description)}</div>` : '';
            const desc = cam.description ? `<div class="meta">${escapeHtml(cam.description)}</div>` : '';
            const status = cam.stream_status || cam.stream_type || '';

            const popupHtml = `
                <div class="camera-popup">
                    <h3>${escapeHtml(cam.title)}</h3>
                    ${videoHtml}
                    <div class="meta"><b>${escapeHtml(cam.group)}</b> · ${escapeHtml(cam.source)}${status ? ' · ' + escapeHtml(status) : ''}</div>
                    ${location}${perspective}${viewDesc}${coverage ? '<div class="meta">Coverage: ' + coverage + '</div>' : ''}${desc}
                    <a href="#" onclick="window.open(frigateUiUrl('${cam.name}'), '_blank'); return false;">Open in Frigate</a>
                </div>
            `;

            const marker = L.marker([cam.lat, cam.lon], { icon }).bindPopup(popupHtml).addTo(map);

            marker.on('popupopen', () => {
                stopAllPlayers();
                if (cam.hls_url) {
                    const videoEl = document.getElementById(`vid_${cam.name}`);
                    if (videoEl) startHls(videoEl, cam.hls_url);
                } else {
                    const imgEl = document.getElementById(`snap_${cam.name}`);
                    if (imgEl) startSnapshot(imgEl, cam.name);
                }
            });
            marker.on('popupclose', stopAllPlayers);
            return marker;
        }

        function initMap() {
            const map = L.map('map').setView([13.7, 100.7], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 18
            }).addTo(map);

            cameras.forEach(cam => {
                const color = (groups[cam.group] && groups[cam.group].color) || '#0a84ff';
                createMarker(map, cam, color);
            });

            if (cameras.length) {
                const bounds = L.latLngBounds(cameras.map(c => [c.lat, c.lon]));
                map.fitBounds(bounds, { padding: [50, 50] });
            }

            map.on('popupclose', stopAllPlayers);
        }

        async function load() {
            try {
                const res = await fetch('../../cameras.json');
                if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
                const data = await res.json();
                groups = data.groups || {};
                cameras = (data.cameras || []).filter(c => c.enabled !== false);
                renderLegend();
                initMap();
            } catch (e) {
                document.getElementById('legend').textContent = 'Failed to load cameras: ' + e.message;
            }
        }

        load();
    </script>
</body>
</html>
