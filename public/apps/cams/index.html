<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameras</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
      <link rel="stylesheet" href="/apps/common.css">
  <link rel="stylesheet" href="cams.css">
  <link rel="stylesheet" href="/assets/tailwind.css">
</head>
<body class="bg-bg text-gray-200">
    <div id="app-nav"></div>

    <div class="relative">
        <div id="map"></div>

        <div class="controls" id="controls">
            <div class="control-row tab-row">
                <button id="tabMap" class="control-btn active">Map</button>
                <button id="tabList" class="control-btn">List</button>
            </div>
            <input type="text" id="search" placeholder="Search cameras..." class="control-input" />
            <select id="groupFilter" class="control-select"><option value="">All groups</option></select>
            <select id="sourceFilter" class="control-select"><option value="">All sources</option></select>
            <div class="control-row">
                <button id="resetBtn" class="control-btn" title="Clear filters">Reset</button>
                <button id="fitBtn" class="control-btn map-only" title="Fit all visible">Fit all</button>
            </div>
            <div class="control-row map-only">
                <button id="prevBtn" class="control-btn" title="Previous camera">&#9664;</button>
                <span id="pageInfo" class="page-info">0 / 0</span>
                <button id="nextBtn" class="control-btn" title="Next camera">&#9654;</button>
            </div>
            <button id="autoBtn" class="control-btn control-btn-primary map-only" title="Auto-discover cameras">&#9654; Discover</button>
        </div>

        <div class="legend map-only" id="legend">Loading cameras...</div>

        <div id="listView" class="list-view hidden">
            <table class="list-table">
                <thead>
                    <tr><th>Name</th><th>Title</th><th>Group</th><th>Source</th><th>Type</th><th>Enabled</th><th>Lat</th><th>Lon</th><th>Heading</th><th></th></tr>
                </thead>
                <tbody id="listBody"></tbody>
            </table>
        </div>

        <div id="detailDrawer" class="detail-drawer hidden">
            <button id="detailClose" class="detail-close">&times;</button>
            <h2 id="detailTitle" style="font-size:16px;margin-bottom:12px;"></h2>
            <div id="detailVideoContainer"></div>
            <div id="detailMeta" style="margin-top:12px;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
      <script src="cams.js"></script>
    <script src="/apps/nav.js"></script>
    <script>ChabaNav.load('/apps/apps.yml', 'app-nav');</script>
</body>
</html>
