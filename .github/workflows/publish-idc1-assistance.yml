name: Publish (idc1-assistance)

on:
  push:
    branches:
      - idc1-assistance
      - idc1-assistance2

permissions:
  contents: read
  actions: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/tonezzz/chaba

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: jarvis-backend
            context: ./services/assistance/jarvis-backend
            file: ./services/assistance/jarvis-backend/Dockerfile
            build_args: ""
          - name: frontend
            image: jarvis-frontend
            context: ./services/assistance/jarvis-frontend
            file: ./services/assistance/jarvis-frontend/Dockerfile.frontend
            build_args: |
              VITE_BASE_PATH=/jarvis/
          - name: web-fetcher
            image: web-fetcher
            context: ./services/assistance/web-fetcher
            file: ./services/assistance/web-fetcher/Dockerfile
            build_args: ""
          - name: mcp-bundle
            image: mcp-bundle
            context: ./services/assistance/mcp-bundle
            file: ./services/assistance/mcp-bundle/Dockerfile
            build_args: ""
          - name: mcp-image-pipeline
            image: mcp-image-pipeline
            context: ./services/assistance/mcp-image-pipeline
            file: ./services/assistance/mcp-image-pipeline/Dockerfile
            build_args: ""
          - name: deep-research-worker
            image: deep-research-worker
            context: ./services/assistance/deep-research-worker
            file: ./services/assistance/deep-research-worker/Dockerfile
            build_args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes for this image
        id: changes
        env:
          CONTEXT_PATH: ${{ matrix.context }}
          DOCKERFILE_PATH: ${{ matrix.file }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Default to build if we can't reliably determine the diff.
          changed="true"

          if [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            if git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null && git cat-file -e "${AFTER_SHA}^{commit}" 2>/dev/null; then
              changed="false"
              mapfile -t files < <(git diff --name-only "${BEFORE_SHA}" "${AFTER_SHA}" || true)

              for f in "${files[@]:-}"; do
                # If the workflow itself changes, rebuild everything (safe default).
                if [[ "${f}" == ".github/workflows/publish-idc1-assistance.yml" ]]; then
                  changed="true"; break
                fi

                # Service-specific change.
                if [[ "${f}" == "${CONTEXT_PATH#./}/"* ]] || [[ "${f}" == "${CONTEXT_PATH#./}" ]]; then
                  changed="true"; break
                fi

                # Dockerfile change for this service.
                if [[ "${f}" == "${DOCKERFILE_PATH#./}" ]]; then
                  changed="true"; break
                fi
              done
            fi
          fi

          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx (CLI)
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          docker version
          docker buildx version
          docker buildx create --name ci-builder --use || docker buildx use ci-builder
          docker buildx inspect --bootstrap

      - name: Log in to GHCR (CLI)
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Build and push (CLI)
        if: steps.changes.outputs.changed == 'true'
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
        run: |
          set -euo pipefail
          REF_NAME="${{ github.ref_name }}"
          SHA_SHORT="${GITHUB_SHA::7}"
          TAG1="${IMAGE}:${REF_NAME}"
          TAG2="${IMAGE}:sha-${SHA_SHORT}"

          BUILD_ARGS=()
          while IFS= read -r line; do
            l="${line//$'\r'/}"
            if [ -n "${l}" ]; then
              BUILD_ARGS+=("--build-arg" "${l}")
            fi
          done <<'EOF'
          ${{ matrix.build_args }}
          EOF

          docker buildx build \
            --file "${{ matrix.file }}" \
            --tag "${TAG1}" \
            --tag "${TAG2}" \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            "${BUILD_ARGS[@]}" \
            "${{ matrix.context }}"
