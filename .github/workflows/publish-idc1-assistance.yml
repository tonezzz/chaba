name: Publish (idc1-assistance)

on:
  push:
    branches:
      - idc1-assistance
      - idc1-assistance2

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/tonezzz/chaba

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: jarvis-backend
            context: ./services/assistance/jarvis-backend
            file: ./services/assistance/jarvis-backend/Dockerfile
            build_args: ""
          - name: frontend
            image: jarvis-frontend
            context: ./services/assistance/jarvis-frontend
            file: ./services/assistance/jarvis-frontend/Dockerfile.frontend
            build_args: |
              VITE_BASE_PATH=/jarvis/
          - name: web-fetcher
            image: web-fetcher
            context: ./services/assistance/web-fetcher
            file: ./services/assistance/web-fetcher/Dockerfile
            build_args: ""
          - name: mcp-bundle
            image: mcp-bundle
            context: ./services/assistance/mcp-bundle
            file: ./services/assistance/mcp-bundle/Dockerfile
            build_args: ""
          - name: mcp-image-pipeline
            image: mcp-image-pipeline
            context: ./services/assistance/mcp-image-pipeline
            file: ./services/assistance/mcp-image-pipeline/Dockerfile
            build_args: ""
          - name: deep-research-worker
            image: deep-research-worker
            context: ./services/assistance/deep-research-worker
            file: ./services/assistance/deep-research-worker/Dockerfile
            build_args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
