name: Build & Push Webtops Claude Image

on:
  push:
    branches:
      - idc1-webtop
    paths:
      - 'mcp/webtops-claude-runtime/**'
      - '.github/workflows/build-webtops-claude.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: mcp/webtops-claude-runtime
          file: mcp/webtops-claude-runtime/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/tonezzz/webtops-claude:latest
            ghcr.io/tonezzz/webtops-claude:${{ github.sha }}
