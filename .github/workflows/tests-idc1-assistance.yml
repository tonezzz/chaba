name: Tests (idc1-assistance)

on:
  push:
    branches:
      - idc1-assistance
  pull_request:

permissions:
  contents: read

jobs:
  jarvis-backend-pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        working-directory: services/assistance/jarvis-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: services/assistance/jarvis-backend
        env:
          PYTHONPATH: .
        run: |
          pytest -q
