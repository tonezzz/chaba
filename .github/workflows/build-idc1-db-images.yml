name: Build idc1-db Images

on:
  push:
    branches: [idc1-db]
    paths:
      - 'mcp/mcp-wiki/**'
      - 'stacks/autoagent-test/**'
      - '.github/workflows/build-idc1-db-images.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  build-mcp-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mcp-wiki
        uses: docker/build-push-action@v5
        with:
          context: ./mcp/mcp-wiki
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/mcp-wiki:latest
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/mcp-wiki:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-autoagent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push autoagent
        uses: docker/build-push-action@v5
        with:
          context: ./stacks/autoagent-test
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/autoagent:latest
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/autoagent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
