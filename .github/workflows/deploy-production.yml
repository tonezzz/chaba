name: Deploy chaba.h3

on:
  push:
    branches:
      - chaba.h3
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chaba-h3-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: chaba.h3
    steps:
      - uses: actions/checkout@v6

      - run: mkdir -p tmp && touch tmp/restart.txt

      - uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: chaba/
          exclude: |
            **/.git*/**
            **/.github/**
            **/deploy.sh
            **/README.md
            **/node_modules/**

      - run: curl --fail --show-error --silent --retry 3 --retry-delay 5 https://chaba.h3.gizmo-thailand.com/health
